# ═══════════════════════════════════════════════════════════════════════════
#  CONFIGURAÇÃO OTIMIZADA DO HYPRLAND (CACHYOS + NOCTALIA)
# ═══════════════════════════════════════════════════════════════════════════

# ═══════════════════════════════════════════════════════════════════════════
#  MONITORES
# ═══════════════════════════════════════════════════════════════════════════
monitor=,1920x1080@60,auto,1

# ═══════════════════════════════════════════════════════════════════════════
#  VARIÁVEIS GLOBAIS
# ═══════════════════════════════════════════════════════════════════════════
$terminal = kitty
$fileManager = thunar 
$mainMod = SUPER
$ipc = qs -c noctalia-shell ipc call

# ═══════════════════════════════════════════════════════════════════════════
#  VARIÁVEIS DE AMBIENTE
# ═══════════════════════════════════════════════════════════════════════════

# --- Otimização para Intel Iris Xe (i5-1135G7) ---
env = LIBVA_DRIVER_NAME,iHD
env = __GLX_VENDOR_LIBRARY_NAME,intel
env = INTEL_VAAPI_DRIVER,iHD

# --- Forçar Wayland em Toolkits ---
env = XDG_CURRENT_DESKTOP,Hyprland
env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland

# Define o tema de ícones para apps GTK (Thunar, Firefox, etc)
#exec-once = gsettings set org.gnome.desktop.interface icon-theme 'Papirus'

# --- Temas e Cursor ---
env = QS_ICON_THEME,Papirus
env = QT_QPA_PLATFORMTHEME=qt6ct
#env = QT_QPA_PLATFORMTHEME=qt5ct
env = XCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,24
env = HYPRCURSOR_THEME,Bibata-Modern-Classic
env = HYPRCURSOR_SIZE,24
# ═══════════════════════════════════════════════════════════════════════════
#  AUTOSTART
# ═══════════════════════════════════════════════════════════════════════════

# --- Essenciais do Sistema ---
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
#exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = dbus-update-activation-environment --systemd --all
exec-once = systemctl --user start hyprland-session.target
#exec-once = /usr/lib/xdg-desktop-portal-hyprland &
#exec-once = /usr/lib/xdg-desktop-portal &


# --- Clipboard Manager ---
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# --- Interface Gráfica (Noctalia) ---
#exec-once = qs -c noctalia-shell --no-duplicate

# ═══════════════════════════════════════════════════════════════════════════
#  APARÊNCIA E COMPORTAMENTO
# ═══════════════════════════════════════════════════════════════════════════

general {
    gaps_in = 5
    gaps_out = 5 
    border_size = 2
    
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    
    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 8
    rounding_power = 2
    
    active_opacity = 1.0
    inactive_opacity = 1.0
    
    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
    
    blur {
        enabled = true
        size = 3
        passes = 2
        vibrancy = 0.1696
    }
}

animations {
    enabled = yes
    
    # --- Curvas de Bezier ---
    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear, 0, 0, 1, 1
    bezier = almostLinear, 0.5, 0.5, 0.75, 1
    bezier = quick, 0.15, 0, 0.1, 1
    
    # --- Animações ---
    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

# ═══════════════════════════════════════════════════════════════════════════
#  INPUT (TECLADO, MOUSE, TOUCHPAD)
# ═══════════════════════════════════════════════════════════════════════════

input {
    kb_layout = br
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    
    follow_mouse = 1
    sensitivity = -0.4
    accel_profile = flat
    
    touchpad {
        natural_scroll = false
    }
}

# ═══════════════════════════════════════════════════════════════════════════
#  KEYBINDINGS
# ═══════════════════════════════════════════════════════════════════════════

# ─────────────────────────────────────────────────────────────────────────────
#  Aplicativos e Sistema
# ─────────────────────────────────────────────────────────────────────────────
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, B, exec, firefox
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exec, hyprctl dispatch exit

# ─────────────────────────────────────────────────────────────────────────────
#  Gerenciamento de Janelas
# ─────────────────────────────────────────────────────────────────────────────
bind = $mainMod, W, togglefloating,
bind = $mainMod, F, fullscreen,
bind = $mainMod, P, pseudo,
bind = $mainMod, J, togglesplit,

# ─────────────────────────────────────────────────────────────────────────────
#  Integração Noctalia Shell
# ─────────────────────────────────────────────────────────────────────────────
bind = $mainMod, SPACE, exec, $ipc launcher toggle
bind = $mainMod, S, exec, $ipc controlCenter toggle
bind = $mainMod, comma, exec, $ipc settings toggle
bind = $mainMod, V, exec, $ipc plugin:clipper toggle

# Funções extras do Clipper
bind = $mainMod CONTROL, C, exec, $ipc plugin:clipper addSelectionToTodo
bind = $mainMod CONTROL, X, exec, $ipc plugin:clipper addSelectionToNoteCard

bind = $mainMod, F1, exec, qs -c noctalia-shell ipc call plugin:keybind-cheatsheet toggle

# Toggle recording on/off
#qs -c noctalia-shell ipc call plugin:screen-recorder toggle

# Explicitly start recording
#qs -c noctalia-shell ipc call plugin:screen-recorder start

# Explicitly stop recording
#qs -c noctalia-shell ipc call plugin:screen-recorder stop

# ─────────────────────────────────────────────────────────────────────────────
#  Controles de Mídia e Hardware
# ─────────────────────────────────────────────────────────────────────────────

# Volume
bindel = , XF86AudioRaiseVolume, exec, $ipc volume increase
bindel = , XF86AudioLowerVolume, exec, $ipc volume decrease
bindl = , XF86AudioMute, exec, $ipc volume muteOutput

# Brilho
bindel = , XF86MonBrightnessUp, exec, $ipc brightness increase
bindel = , XF86MonBrightnessDown, exec, $ipc brightness decrease

# Player de Mídia
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# ─────────────────────────────────────────────────────────────────────────────
#  Screenshots
# ─────────────────────────────────────────────────────────────────────────────
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy
bind = SHIFT, Print, exec, grim -g "$(slurp)" ~/Imagens/Screenshot_$(date +'%Y%m%d_%H%M%S').png

# ─────────────────────────────────────────────────────────────────────────────
#  Navegação e Foco
# ─────────────────────────────────────────────────────────────────────────────
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# ─────────────────────────────────────────────────────────────────────────────
#  Workspaces
# ─────────────────────────────────────────────────────────────────────────────
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Mover janela para Workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Workspace Especial (Magic)
bind = $mainMod, MINUS, togglespecialworkspace, magic
bind = $mainMod SHIFT, MINUS, movetoworkspace, special:magic

# Scroll no mouse para mudar workspace
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# ─────────────────────────────────────────────────────────────────────────────
#  Mouse: Mover e Redimensionar
# ─────────────────────────────────────────────────────────────────────────────
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ═══════════════════════════════════════════════════════════════════════════
#  REGRAS DE JANELAS E LAYERS
# ═══════════════════════════════════════════════════════════════════════════

# Regras Específicas do Noctalia
layerrule {
  name = noctalia
  match:namespace = noctalia-background-.*$
  ignore_alpha = 0.5
  blur = true
  blur_popups = true
}

# ═══════════════════════════════════════════════════════════════════════════
#  IMPORTAR CORES DO NOCTALIA
# ═══════════════════════════════════════════════════════════════════════════
source = ~/.config/hypr/noctalia/noctalia-colors.conf
