# vim:fileencoding=utf-8:ft=conf
# ╔══════════════════════════════════════════════════════╗
# ║                   kitty.conf                        ║
# ╚══════════════════════════════════════════════════════╝


# ── Fonts ─────────────────────────────────────────────────────────────────────

font_family      FiraCode Nerd Font 
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# Ligatures: "always", "never" ou "cursor" (apenas sob o cursor)
font_features MesloLGS-Nerd-Font-Mono +liga +calt

# Nerd Font symbols — garante renderização correta de ícones e Powerline
symbol_map U+E0A0-U+E0A2,U+E0B0-U+E0B3 PowerlineSymbols
symbol_map U+E000-U+E00D,U+E0A0-U+E0C8,U+E0CA,U+E0CC-U+E0D4 Symbols Nerd Font Mono
symbol_map U+F000-U+F2E0 Symbols Nerd Font Mono


# ── Cursor ────────────────────────────────────────────────────────────────────

cursor_shape              block
cursor_blink_interval     0.5
cursor_stop_blinking_after 15.0


# ── Scrollback ────────────────────────────────────────────────────────────────

scrollback_lines 9000
scrollback_pager less +G -R


# ── Mouse ─────────────────────────────────────────────────────────────────────

mouse_hide_wait          0.0
wheel_scroll_multiplier  5.0
click_interval           0.5
select_by_word_characters :@-./_~?&=%+#


# ── Performance ───────────────────────────────────────────────────────────────

repaint_delay 10
input_delay   3


# ── Bell ──────────────────────────────────────────────────────────────────────

visual_bell_duration 0.0
enable_audio_bell    no


# ── Window ────────────────────────────────────────────────────────────────────

background_opacity       0.9
window_border_width      0
window_margin_width      15
hide_window_decorations  yes
remember_window_size     yes
confirm_os_window_close  0
enabled_layouts          *


# ── URLs ──────────────────────────────────────────────────────────────────────

open_url_modifiers ctrl+shift
open_url_with      default


# ── Misc ──────────────────────────────────────────────────────────────────────

term               xterm-kitty
allow_remote_control yes


# ── Keymaps: Clipboard ────────────────────────────────────────────────────────

#map super+v      paste_from_clipboard
#map super+c      copy_to_clipboard

# ── Keymaps: Scrolling ────────────────────────────────────────────────────────

map ctrl+shift+k         scroll_line_up
map ctrl+shift+j         scroll_line_down
map ctrl+shift+page_up   scroll_page_up
map ctrl+shift+page_down scroll_page_down
map ctrl+shift+home      scroll_home
map ctrl+shift+end       scroll_end
map ctrl+shift+h         show_scrollback


# ── Keymaps: Font Size ────────────────────────────────────────────────────────

map ctrl+equal           increase_font_size
map ctrl+minus           decrease_font_size
map ctrl+shift+backspace restore_font_size


# ── Keymaps: Window Management ────────────────────────────────────────────────

map super+n          new_os_window
map super+w          close_window
map ctrl+shift+enter new_window
map ctrl+shift+]     next_window
map ctrl+shift+[     previous_window
map ctrl+shift+f     move_window_forward
map ctrl+shift+b     move_window_backward
map ctrl+shift+`     move_window_to_top
map ctrl+shift+1     first_window
map ctrl+shift+2     second_window
map ctrl+shift+3     third_window
map ctrl+shift+4     fourth_window
map ctrl+shift+5     fifth_window
map ctrl+shift+6     sixth_window
map ctrl+shift+7     seventh_window
map ctrl+shift+8     eighth_window
map ctrl+shift+9     ninth_window
map ctrl+shift+0     tenth_window


# ── Keymaps: Tab Management ───────────────────────────────────────────────────

map ctrl+shift+right next_tab
map ctrl+shift+left  previous_tab
map ctrl+shift+t     new_tab
map ctrl+shift+q     close_tab
map ctrl+shift+l     next_layout
map ctrl+shift+.     move_tab_forward
map ctrl+shift+,     move_tab_backward


# ── Theme ─────────────────────────────────────────────────────────────────────

include ~/.config/kitty/themes/noctalia.conf

# copy middle button
copy_on_select clipboard
