# Ferramentas instaladas diretamente via curl/sh

[[tools]]
name = "agy"
binaries = ["agy"]
fallback_paths = ["$HOME/.local/bin/agy"]
install_url = "https://antigravity.google/cli/install.sh"
env_var = "NONINTERACTIVE"
env_value = "1"

[[tools]]
name = "pi-coding-agent"
binaries = ["pi", "pi-coding-agent"]
fallback_paths = ["$HOME/.local/bin/pi"]
install_url = "https://pi.dev/install.sh"
env_var = "NONINTERACTIVE"
env_value = "1"

[[tools]]
name = "herdr"
binaries = ["herdr"]
fallback_paths = ["$HOME/.local/bin/herdr"]
install_url = "https://herdr.dev/install.sh"
env_var = "NONINTERACTIVE"
env_value = "1"
